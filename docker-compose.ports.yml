# ─────────────────────────────────────────────────────────────────────────────
#  Port bindings overlay — modes 1 (local) and 3 (server with own proxy)
#
#  Services are bound to BIND_ADDR (set by make build):
#    127.0.0.1  — modes 1 and 3 (proxy on host connects via localhost)
#
#  Selected automatically via COMPOSE_FILE in .env (generated by make build).
#  Do not include this file manually.
# ─────────────────────────────────────────────────────────────────────────────

services:

  synapse:
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT_SYNAPSE:-8008}:8008"

  element-web:
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT_ELEMENT:-8080}:80"

  cinny:
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT_CINNY:-8081}:8080"

  livekit:
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT_LIVEKIT:-7880}:7880"
      - "${BIND_ADDR:-127.0.0.1}:7881:7881"

  stickerpicker:
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT_STICKERS:-8090}:80"
