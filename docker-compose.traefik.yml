# ─────────────────────────────────────────────────────────────────────────────
#  Traefik overlay — modes 2 (local+Traefik) and 4 (server+Traefik)
#
#  Adds Traefik reverse proxy and routing labels to services.
#  Traefik reaches services via the internal `hyperchat` Docker network.
#  Synapse Admin is intentionally excluded — stays on localhost only.
#
#  BIND_ADDR controls where Traefik listens:
#    127.0.0.1  — mode 2 (local, no public exposure)
#    0.0.0.0    — mode 4 (public server)
#
#  Selected automatically via COMPOSE_FILE in .env (generated by make build).
#  Do not include this file manually.
# ─────────────────────────────────────────────────────────────────────────────

services:

  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "${BIND_ADDR:-127.0.0.1}:80:80"
      - "${BIND_ADDR:-127.0.0.1}:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/certs
    networks:
      - hyperchat
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  synapse:
    labels:
      traefik.enable: "true"
      traefik.http.routers.synapse.rule: "Host(`${HOST_MATRIX}`)"
      traefik.http.routers.synapse.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.synapse.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.synapse.tls.certresolver: "letsencrypt"
      traefik.http.services.synapse.loadbalancer.server.port: "8008"

  element-web:
    labels:
      traefik.enable: "true"
      traefik.http.routers.element.rule: "Host(`${HOST_ELEMENT}`)"
      traefik.http.routers.element.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.element.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.element.tls.certresolver: "letsencrypt"
      traefik.http.services.element.loadbalancer.server.port: "80"

  cinny:
    labels:
      traefik.enable: "true"
      traefik.http.routers.cinny.rule: "Host(`${HOST_CINNY}`)"
      traefik.http.routers.cinny.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.cinny.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.cinny.tls.certresolver: "letsencrypt"
      traefik.http.services.cinny.loadbalancer.server.port: "8080"

  livekit:
    labels:
      traefik.enable: "true"
      traefik.http.routers.livekit.rule: "Host(`${HOST_LIVEKIT}`)"
      traefik.http.routers.livekit.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.livekit.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.livekit.tls.certresolver: "letsencrypt"
      traefik.http.services.livekit.loadbalancer.server.port: "7880"

  mas:
    labels:
      traefik.enable: "true"
      traefik.http.routers.mas.rule: "Host(`${HOST_MAS}`)"
      traefik.http.routers.mas.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.mas.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.mas.tls.certresolver: "letsencrypt"
      traefik.http.services.mas.loadbalancer.server.port: "8080"

  stickerpicker:
    labels:
      traefik.enable: "true"
      traefik.http.routers.stickers.rule: "Host(`${HOST_STICKERS}`)"
      traefik.http.routers.stickers.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.stickers.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.stickers.tls.certresolver: "letsencrypt"
      traefik.http.services.stickers.loadbalancer.server.port: "80"

volumes:
  traefik_certs:
